<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Hosting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #161b22;
            padding: 1rem;
            border-bottom: 1px solid #30363d;
            text-align: center;
        }
        
        header h1 {
            font-size: 1.5rem;
            color: #58a6ff;
        }
        
        iframe {
            flex: 1;
            border: none;
            width: 100%;
        }
        
        .error {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            gap: 1rem;
        }
        
        .error-text {
            color: #f85149;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bot Hosting Dashboard</h1>
        </header>
        <iframe 
            id="embedFrame"
            src="https://unglue-smelting-rut.ngrok-free.dev/"
            title="Bot Hosting Embed">
        </iframe>
    </div>
    
    <script>
        // Check if iframe loads successfully
        document.getElementById('embedFrame').addEventListener('error', function() {
            this.style.display = 'none';
            document.querySelector('.container').innerHTML += `
                <div class="error">
                    <div class="error-text">
                        <p>⚠️ Unable to load the embedded page</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">
                            This may be due to CORS/framing restrictions on the external server.
                        </p>
                        <a href="http://us1.bot-hosting.net:20183/" target="_blank" style="color: #58a6ff; text-decoration: none; margin-top: 1rem;">
                            Open in new tab →
                        </a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
