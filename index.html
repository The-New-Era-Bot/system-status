<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Status Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            overflow: hidden; /* Prevents double scrollbars */
        }
        .container { 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        header { 
            background: #161b22; 
            padding: 1rem; 
            border-bottom: 1px solid #30363d; 
            text-align: center; 
        }
        header h1 { 
            font-size: 1.2rem; 
            color: #58a6ff; 
        }
        iframe { 
            flex: 1; 
            border: none; 
            width: 100%; 
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>System Status</h1>
        </header>
        
        <iframe src="https://unglue-smelting-rut.ngrok-free.dev/status"></iframe>
    </div>
</body>
</html>
